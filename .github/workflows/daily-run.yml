name: Daily Production Run

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * 1-5"

permissions:
  contents: write

jobs:
  production:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily production report
        run: python -m swing_engine run-decision-report

      - name: Commit updated docs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/dashboard.html docs/decision_report.txt
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git commit -m "Update daily production outputs"
          git push
