name: Swing Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 1-5"

permissions:
  pages: write
  id-token: write

concurrency:
  group: swing-engine-pages
  cancel-in-progress: false

jobs:
  run-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run swing engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCHWAB_APP_KEY: ${{ secrets.SCHWAB_APP_KEY }}
          SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
        run: |
          python -m swing_engine run
          python -m swing_engine backfill

      - name: Prepare Pages site
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/reports
          cp dashboard.html site/index.html
          if ls reports/*.json >/dev/null 2>&1; then
            cp reports/*.json site/reports/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
